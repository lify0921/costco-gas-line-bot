name: Daily Gas Price

on:
  schedule:
    - cron: "30 0 * * *"  # 00:30 UTC = 09:30 JST
  workflow_dispatch:

concurrency:
  group: daily-price
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          rm -rf ~/.cache/matplotlib

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
        run: cd src && python main.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv data/last_notified.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update data $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push失敗、リトライ $i/3"
            sleep 5
          done
