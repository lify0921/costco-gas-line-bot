name: Daily Gas Price

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC = 12:00 JST
  workflow_dispatch:

concurrency:
  group: daily-price
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Japanese fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          rm -rf ~/.cache/matplotlib

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare (scrape + graph)
        run: cd src && python main.py --stage prepare

      - name: Commit and push graph/CSV
        id: push_graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv
          [ -d data/graphs ] && git add data/graphs/ || true
          if git diff --cached --quiet; then
            echo "No graph/CSV changes"
            exit 0
          fi
          git commit -m "Update graph/CSV $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push失敗、リトライ $i/3"
            sleep 5
          done
          echo "push失敗（上限到達）"
          exit 1

      - name: Wait for GitHub raw CDN propagation
        run: sleep 15

      - name: Notify (send LINE)
        env:
          LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
        run: cd src && python main.py --stage notify

      - name: Commit and push last_notified
        run: |
          git add data/last_notified.json
          if git diff --cached --quiet; then
            echo "No last_notified changes"
            exit 0
          fi
          git commit -m "Update last_notified $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push失敗、リトライ $i/3"
            sleep 5
          done
          exit 1
